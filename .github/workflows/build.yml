name: Build and Push

on:
  schedule:
    # Weekly: Check for new MariaDB versions
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      mariadb_version:
        description: 'MariaDB version to build (empty = latest only)'
        required: false
        default: ''
      build_all:
        description: 'Build all recent versions (5)'
        type: boolean
        default: false
      force_rebuild:
        description: 'Force rebuild existing tags'
        type: boolean
        default: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: devsaurus/mariadb-galera

jobs:
  detect-versions:
    runs-on: [self-hosted, Linux, ARM64, oci]
    outputs:
      versions: ${{ steps.detect.outputs.versions }}
      latest: ${{ steps.detect.outputs.latest }}
      major_latest: ${{ steps.detect.outputs.major_latest }}
    steps:
      - name: Detect MariaDB versions
        id: detect
        run: |
          # Get available MariaDB tags from Docker Hub
          ALL_TAGS=$(curl -s "https://hub.docker.com/v2/repositories/library/mariadb/tags?page_size=100" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -10)

          LATEST_TAG=$(echo "$ALL_TAGS" | tail -1)
          echo "latest=$LATEST_TAG" >> $GITHUB_OUTPUT

          # Determine which versions to build
          if [[ -n "${{ github.event.inputs.mariadb_version }}" ]]; then
            TAGS="${{ github.event.inputs.mariadb_version }}"
            echo "Mode: Single version (manual input)"
          elif [[ "${{ github.event.inputs.build_all }}" == "true" ]]; then
            TAGS=$(echo "$ALL_TAGS" | tail -5)
            echo "Mode: All recent versions (build_all)"
          elif [[ "${{ github.event_name }}" == "schedule" ]]; then
            TAGS=$(echo "$ALL_TAGS" | tail -5)
            echo "Mode: All recent versions (scheduled)"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            TAGS=$(echo "$ALL_TAGS" | tail -5)
            echo "Mode: All recent versions (push)"
          else
            TAGS="$LATEST_TAG"
            echo "Mode: Latest only (default)"
          fi

          # Calculate latest version for each major
          declare -A MAJOR_LATEST
          for tag in $TAGS; do
            major="${tag%%.*}"
            MAJOR_LATEST[$major]="$tag"
          done

          # Convert to JSON: {"10": "10.6", "11": "11.4", "12": "12.1"}
          MAJOR_JSON="{"
          first=true
          for major in "${!MAJOR_LATEST[@]}"; do
            if [ "$first" = true ]; then
              first=false
            else
              MAJOR_JSON+=","
            fi
            MAJOR_JSON+="\"$major\":\"${MAJOR_LATEST[$major]}\""
          done
          MAJOR_JSON+="}"

          echo "major_latest=$MAJOR_JSON" >> $GITHUB_OUTPUT
          echo "Major latest versions: $MAJOR_JSON"

          JSON=$(echo "$TAGS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "versions=$JSON" >> $GITHUB_OUTPUT
          echo "Building versions: $JSON"

  build:
    needs: detect-versions
    runs-on: [self-hosted, Linux, ARM64, oci]
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        version: ${{ fromJson(needs.detect-versions.outputs.versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Parse version
        id: version
        run: |
          VERSION="${{ matrix.version }}"
          MAJOR="${VERSION%%.*}"
          echo "major=$MAJOR" >> $GITHUB_OUTPUT

          # Check if this version is the latest for its major
          MAJOR_LATEST='${{ needs.detect-versions.outputs.major_latest }}'
          LATEST_FOR_MAJOR=$(echo "$MAJOR_LATEST" | jq -r ".[\"$MAJOR\"]")

          if [[ "$VERSION" == "$LATEST_FOR_MAJOR" ]]; then
            echo "is_major_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_major_latest=false" >> $GITHUB_OUTPUT
          fi

          # Check if this is the overall latest
          if [[ "$VERSION" == "${{ needs.detect-versions.outputs.latest }}" ]]; then
            echo "is_latest=true" >> $GITHUB_OUTPUT
          else
            echo "is_latest=false" >> $GITHUB_OUTPUT
          fi

          echo "Version: $VERSION, Major: $MAJOR, Latest for major: $LATEST_FOR_MAJOR"

      - name: Check existing resources
        id: check
        run: |
          FORCE="${{ github.event.inputs.force_rebuild }}"

          # Check image exists
          if [[ "$FORCE" == "true" ]]; then
            IMAGE_EXISTS="false"
            echo "Force rebuild requested"
          elif docker manifest inspect ${{ env.IMAGE_NAME }}:${{ matrix.version }} > /dev/null 2>&1; then
            IMAGE_EXISTS="true"
            echo "Image ${{ matrix.version }} already exists"
          else
            IMAGE_EXISTS="false"
            echo "Image ${{ matrix.version }} not found, will build"
          fi
          echo "image_exists=$IMAGE_EXISTS" >> $GITHUB_OUTPUT

          # Check release exists
          RELEASE_EXISTS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ matrix.version }}")

          if [[ "$RELEASE_EXISTS" == "200" ]] && [[ "$FORCE" != "true" ]]; then
            echo "release_exists=true" >> $GITHUB_OUTPUT
            echo "Release v${{ matrix.version }} already exists"
          else
            echo "release_exists=false" >> $GITHUB_OUTPUT
          fi

          # Determine if we need to build
          if [[ "$IMAGE_EXISTS" == "true" ]]; then
            echo "needs_build=false" >> $GITHUB_OUTPUT
          else
            echo "needs_build=true" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build tags
        if: steps.check.outputs.needs_build == 'true'
        id: tags
        run: |
          TAGS="${{ env.IMAGE_NAME }}:${{ matrix.version }}"

          # Add major tag if this is the latest for its major version
          if [[ "${{ steps.version.outputs.is_major_latest }}" == "true" ]]; then
            TAGS="$TAGS,${{ env.IMAGE_NAME }}:${{ steps.version.outputs.major }}"
          fi

          # Add latest tag if this is the overall latest
          if [[ "${{ steps.version.outputs.is_latest }}" == "true" ]]; then
            TAGS="$TAGS,${{ env.IMAGE_NAME }}:latest"
          fi

          echo "tags=$TAGS" >> $GITHUB_OUTPUT
          echo "Building with tags: $TAGS"

      - name: Build and push
        if: steps.check.outputs.needs_build == 'true'
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          build-args: |
            MARIADB_VERSION=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Get image digest
        if: steps.check.outputs.needs_build == 'true'
        id: digest
        run: |
          DIGEST="${{ steps.build.outputs.digest }}"
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          echo "short_digest=${DIGEST:7:12}" >> $GITHUB_OUTPUT

      - name: Docker Scout - SBOM
        if: steps.check.outputs.needs_build == 'true'
        uses: docker/scout-action@v1
        with:
          command: sbom
          image: ${{ env.IMAGE_NAME }}:${{ matrix.version }}
          output: sbom-${{ matrix.version }}.spdx.json
          format: spdx
        continue-on-error: true

      - name: Docker Scout - CVE Scan
        if: steps.check.outputs.needs_build == 'true'
        id: scout
        uses: docker/scout-action@v1
        with:
          command: cves
          image: ${{ env.IMAGE_NAME }}:${{ matrix.version }}
          sarif-file: cve-report-${{ matrix.version }}.sarif
          summary: true
        continue-on-error: true

      - name: Parse CVE results
        if: steps.check.outputs.needs_build == 'true'
        id: cve
        run: |
          if [[ -f "cve-report-${{ matrix.version }}.sarif" ]]; then
            CRITICAL=$(jq '[.runs[].results[] | select(.level == "error")] | length' cve-report-${{ matrix.version }}.sarif 2>/dev/null || echo "0")
            HIGH=$(jq '[.runs[].results[] | select(.level == "warning")] | length' cve-report-${{ matrix.version }}.sarif 2>/dev/null || echo "0")
            MEDIUM=$(jq '[.runs[].results[] | select(.level == "note")] | length' cve-report-${{ matrix.version }}.sarif 2>/dev/null || echo "0")
          else
            CRITICAL=0
            HIGH=0
            MEDIUM=0
          fi
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM" >> $GITHUB_OUTPUT

      - name: Get platform digests
        if: steps.check.outputs.needs_build == 'true'
        id: platforms
        run: |
          AMD64_DIGEST=$(docker manifest inspect ${{ env.IMAGE_NAME }}:${{ matrix.version }} | \
            jq -r '.manifests[] | select(.platform.architecture=="amd64") | .digest' | head -1)
          ARM64_DIGEST=$(docker manifest inspect ${{ env.IMAGE_NAME }}:${{ matrix.version }} | \
            jq -r '.manifests[] | select(.platform.architecture=="arm64") | .digest' | head -1)

          echo "amd64=$AMD64_DIGEST" >> $GITHUB_OUTPUT
          echo "arm64=$ARM64_DIGEST" >> $GITHUB_OUTPUT

      - name: Upload SBOM artifact
        if: steps.check.outputs.needs_build == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: sbom-${{ matrix.version }}
          path: sbom-${{ matrix.version }}.spdx.json
          retention-days: 90
        continue-on-error: true

      - name: Upload CVE report
        if: steps.check.outputs.needs_build == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: cve-report-${{ matrix.version }}
          path: cve-report-${{ matrix.version }}.sarif
          retention-days: 90
        continue-on-error: true

      - name: Prepare build info
        id: info
        run: |
          # Determine status
          if [[ "${{ steps.check.outputs.needs_build }}" == "false" ]]; then
            STATUS="skipped"
          elif [[ -n "${{ steps.build.outputs.digest }}" ]]; then
            STATUS="success"
          else
            STATUS="failed"
          fi

          # Build tags string
          if [[ "${{ steps.version.outputs.is_latest }}" == "true" ]]; then
            TAGS_STR="${{ matrix.version }}, ${{ steps.version.outputs.major }}, latest"
          elif [[ "${{ steps.version.outputs.is_major_latest }}" == "true" ]]; then
            TAGS_STR="${{ matrix.version }}, ${{ steps.version.outputs.major }}"
          else
            TAGS_STR="${{ matrix.version }}"
          fi

          cat > build-${{ matrix.version }}.json << EOF
          {
            "version": "${{ matrix.version }}",
            "major": "${{ steps.version.outputs.major }}",
            "status": "$STATUS",
            "tags": "$TAGS_STR",
            "digest": "${{ steps.build.outputs.digest }}",
            "short_digest": "${{ steps.digest.outputs.short_digest }}",
            "cve_critical": "${{ steps.cve.outputs.critical }}",
            "cve_high": "${{ steps.cve.outputs.high }}",
            "cve_medium": "${{ steps.cve.outputs.medium }}",
            "is_latest": "${{ steps.version.outputs.is_latest }}",
            "is_major_latest": "${{ steps.version.outputs.is_major_latest }}"
          }
          EOF

      - name: Upload build info
        uses: actions/upload-artifact@v7
        with:
          name: build-info-${{ matrix.version }}
          path: build-${{ matrix.version }}.json
          retention-days: 7

      - name: Create GitHub Release
        if: steps.check.outputs.needs_build == 'true' && steps.check.outputs.release_exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ matrix.version }}
          name: v${{ matrix.version }}
          body: |
            # MariaDB Galera Cluster ${{ matrix.version }}

            Based on official `mariadb:${{ matrix.version }}` image with Devsaurus Galera automation.

            ## 🐳 Docker Pull

            ```bash
            docker pull devsaurus/mariadb-galera:${{ matrix.version }}
            ```

            ## 🏷️ Available Tags

            | Tag | Description |
            |-----|-------------|
            | `${{ matrix.version }}` | This version |
            ${{ steps.version.outputs.is_major_latest == 'true' && format('| `{0}` | Major version (latest {0}.x) |', steps.version.outputs.major) || '' }}
            ${{ steps.version.outputs.is_latest == 'true' && '| `latest` | Latest stable |' || '' }}

            ## 🔐 Image Verification

            | Item | Value |
            |------|-------|
            | **Digest** | `${{ steps.digest.outputs.digest }}` |
            | **SBOM** | SPDX format (see artifacts) |
            | **Provenance** | SLSA (max) |

            ## 🖥️ Platform Support

            | Platform | Architecture | Digest |
            |----------|--------------|--------|
            | Linux | `amd64` | `${{ steps.platforms.outputs.amd64 }}` |
            | Linux | `arm64` | `${{ steps.platforms.outputs.arm64 }}` |

            ## 🛡️ Security Scan (Docker Scout)

            | Severity | Count |
            |----------|-------|
            | 🔴 Critical | ${{ steps.cve.outputs.critical }} |
            | 🟠 High | ${{ steps.cve.outputs.high }} |
            | 🟡 Medium | ${{ steps.cve.outputs.medium }} |

            ## 🚀 Quick Start

            ```bash
            # Single node (testing)
            docker run -d --name galera \
              -e MARIADB_ROOT_PASSWORD=secret \
              -e GALERA_CLUSTER_BOOTSTRAP=yes \
              devsaurus/mariadb-galera:${{ matrix.version }}

            # 3-node cluster
            docker run -d --name galera-1 \
              -e MARIADB_ROOT_PASSWORD=secret \
              -e GALERA_CLUSTER_NAME=mycluster \
              -e GALERA_CLUSTER_ADDRESS=galera-1,galera-2,galera-3 \
              -e GALERA_CLUSTER_BOOTSTRAP=yes \
              -e GALERA_SST_PASSWORD=sstpass \
              devsaurus/mariadb-galera:${{ matrix.version }}
            ```

            ## 📜 License

            - **Scripts**: MIT
            - **MariaDB**: GPLv2
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  summary:
    needs: [ detect-versions, build ]
    runs-on: [self-hosted, Linux, ARM64, oci]
    if: always()
    steps:
      - name: Download all build info
        uses: actions/download-artifact@v8
        with:
          pattern: build-info-*
          merge-multiple: true
        continue-on-error: true

      - name: Generate summary
        run: |
          shopt -s nullglob

          echo "# 🐳 MariaDB Galera Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build info
          echo "## 📋 Build Information" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Trigger** | \`${{ github.event_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run** | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Time** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Build results table
          echo "## 📦 Build Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Version | Status | Tags | Digest | CVE (C/H/M) |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|------|--------|-------------|" >> $GITHUB_STEP_SUMMARY

          SUCCESS_COUNT=0
          SKIPPED_COUNT=0
          FAILED_COUNT=0
          FOUND_FILES=0

          for file in build-*.json; do
            FOUND_FILES=1
            VERSION=$(jq -r '.version' "$file")
            STATUS=$(jq -r '.status' "$file")
            TAGS=$(jq -r '.tags' "$file")
            DIGEST=$(jq -r '.short_digest' "$file")
            CVE_C=$(jq -r '.cve_critical' "$file")
            CVE_H=$(jq -r '.cve_high' "$file")
            CVE_M=$(jq -r '.cve_medium' "$file")

            if [[ "$STATUS" == "success" ]]; then
              STATUS_ICON="✅"
              SUCCESS_COUNT=$((SUCCESS_COUNT + 1))
            elif [[ "$STATUS" == "skipped" ]]; then
              STATUS_ICON="⏭️"
              SKIPPED_COUNT=$((SKIPPED_COUNT + 1))
              DIGEST="-"
              CVE_C="-"
              CVE_H="-"
              CVE_M="-"
            else
              STATUS_ICON="❌"
              FAILED_COUNT=$((FAILED_COUNT + 1))
              DIGEST="-"
              CVE_C="-"
              CVE_H="-"
              CVE_M="-"
            fi

            echo "| $VERSION | $STATUS_ICON $STATUS | \`$TAGS\` | \`$DIGEST\` | $CVE_C / $CVE_H / $CVE_M |" >> $GITHUB_STEP_SUMMARY
          done

          if [[ $FOUND_FILES -eq 0 ]]; then
            echo "| - | ⚠️ No build data | - | - | - |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Statistics
          echo "## 📊 Statistics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Count |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Built | $SUCCESS_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| ⏭️ Skipped (exists) | $SKIPPED_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | $FAILED_COUNT |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Platform info
          echo "## 🖥️ Supported Platforms" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Architecture | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | \`amd64\` (x86_64) | ✅ Supported |" >> $GITHUB_STEP_SUMMARY
          echo "| Linux | \`arm64\` (aarch64) | ✅ Supported |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Security info
          echo "## 🛡️ Security" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Feature | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| **SBOM** | ✅ SPDX format |" >> $GITHUB_STEP_SUMMARY
          echo "| **Provenance** | ✅ SLSA (max) |" >> $GITHUB_STEP_SUMMARY
          echo "| **CVE Scan** | ✅ Docker Scout |" >> $GITHUB_STEP_SUMMARY
          echo "| **Signing** | ✅ Sigstore |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Quick start
          echo "## 🚀 Quick Start" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "# Pull latest" >> $GITHUB_STEP_SUMMARY
          echo "docker pull devsaurus/mariadb-galera:latest" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Verify digest" >> $GITHUB_STEP_SUMMARY
          echo "docker images --digests devsaurus/mariadb-galera" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# Run single node" >> $GITHUB_STEP_SUMMARY
          echo "docker run -d --name galera \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e MARIADB_ROOT_PASSWORD=secret \\" >> $GITHUB_STEP_SUMMARY
          echo "  -e GALERA_CLUSTER_BOOTSTRAP=yes \\" >> $GITHUB_STEP_SUMMARY
          echo "  devsaurus/mariadb-galera:latest" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Links
          echo "## 🔗 Links" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- [Docker Hub](https://hub.docker.com/r/devsaurus/mariadb-galera)" >> $GITHUB_STEP_SUMMARY
          echo "- [GitHub Repository](https://github.com/${{ github.repository }})" >> $GITHUB_STEP_SUMMARY
          echo "- [MariaDB Official](https://hub.docker.com/_/mariadb)" >> $GITHUB_STEP_SUMMARY
          echo "- [Galera Documentation](https://galeracluster.com/library/documentation/)" >> $GITHUB_STEP_SUMMARY
