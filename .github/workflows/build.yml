name: Build and Push

on:
  schedule:
    # Weekly: Check for new MariaDB versions
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      mariadb_version:
        description: 'MariaDB version to build'
        required: false
        default: ''
      force_rebuild:
        description: 'Force rebuild existing tags'
        type: boolean
        default: false

env:
  REGISTRY: docker.io
  IMAGE_NAME: devsaurus/mariadb-galera

jobs:
  detect-versions:
    runs-on: ubuntu-latest
    outputs:
      versions: ${{ steps.detect.outputs.versions }}
      latest_version: ${{ steps.detect.outputs.latest_version }}
    steps:
      - name: Detect MariaDB versions
        id: detect
        run: |
          # Get available MariaDB tags from Docker Hub (sorted ascending)
          TAGS=$(curl -s "https://hub.docker.com/v2/repositories/library/mariadb/tags?page_size=100" \
            | jq -r '.results[].name' \
            | grep -E '^[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -6)

          # If manual input provided, use that instead
          if [[ -n "${{ github.event.inputs.mariadb_version }}" ]]; then
            TAGS="${{ github.event.inputs.mariadb_version }}"
          fi

          # Get latest version (last in sorted list)
          LATEST=$(echo "$TAGS" | tail -1)
          echo "latest_version=$LATEST" >> $GITHUB_OUTPUT

          # Convert to JSON array (ascending order for sequential build)
          JSON=$(echo "$TAGS" | jq -R -s -c 'split("\n") | map(select(length > 0))')
          echo "versions=$JSON" >> $GITHUB_OUTPUT
          echo "Building versions: $JSON"
          echo "Latest version: $LATEST"

  build:
    needs: detect-versions
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1  # Sequential build for correct order
      matrix:
        version: ${{ fromJson(needs.detect-versions.outputs.versions) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if image exists
        id: check
        if: ${{ github.event.inputs.force_rebuild != 'true' }}
        run: |
          if docker manifest inspect ${{ env.IMAGE_NAME }}:${{ matrix.version }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Image ${{ matrix.version }} already exists, skipping..."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.check.outputs.exists != 'true'
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: steps.check.outputs.exists != 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        if: steps.check.outputs.exists != 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.version }}
            type=raw,value=latest,enable=${{ matrix.version == needs.detect-versions.outputs.latest_version }}

      - name: Build and push
        if: steps.check.outputs.exists != 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MARIADB_VERSION=${{ matrix.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Create GitHub Release
        if: steps.check.outputs.exists != 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ matrix.version }}
          name: MariaDB Galera ${{ matrix.version }}
          body: |
            ## MariaDB Galera Cluster ${{ matrix.version }}

            Based on official `mariadb:${{ matrix.version }}` image with Devsaurus Galera automation.

            ### Pull
            ```bash
            docker pull devsaurus/mariadb-galera:${{ matrix.version }}
            ```

            ### Quick Start
            ```bash
            # Single node
            docker run -d --name galera \
              -e MARIADB_ROOT_PASSWORD=secret \
              -e GALERA_CLUSTER_BOOTSTRAP=yes \
              devsaurus/mariadb-galera:${{ matrix.version }}
            ```

            ### Platforms
            - linux/amd64
            - linux/arm64

            ### License
            - Scripts: MIT
            - MariaDB: GPLv2
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
