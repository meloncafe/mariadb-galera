# MariaDB Galera Cluster - 3 Node Example
# Usage:
#   1. Start first node:  docker compose up -d galera-1
#   2. Wait for ready:    docker compose logs -f galera-1
#   3. Start others:      docker compose up -d galera-2 galera-3

x-galera-common: &galera-common
  image: devsaurus/mariadb-galera:11.4
  environment: &galera-env
    MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-rootpass}
    MARIADB_DATABASE: ${MARIADB_DATABASE:-myapp}
    MARIADB_USER: ${MARIADB_USER:-myuser}
    MARIADB_PASSWORD: ${MARIADB_PASSWORD:-mypass}
    GALERA_CLUSTER_NAME: galera_cluster
    GALERA_CLUSTER_ADDRESS: galera-1,galera-2,galera-3
    GALERA_SST_METHOD: mariabackup
    GALERA_SST_USER: mariabackup
    GALERA_SST_PASSWORD: ${GALERA_SST_PASSWORD:-sstpass}
  networks:
    - galera-net
  restart: unless-stopped

services:
  galera-1:
    <<: *galera-common
    container_name: galera-1
    hostname: galera-1
    environment:
      <<: *galera-env
      GALERA_NODE_NAME: galera-1
      GALERA_CLUSTER_BOOTSTRAP: "yes"  # First node bootstraps
    ports:
      - "3306:3306"
    volumes:
      - galera-1-data:/var/lib/mysql

  galera-2:
    <<: *galera-common
    container_name: galera-2
    hostname: galera-2
    environment:
      <<: *galera-env
      GALERA_NODE_NAME: galera-2
    volumes:
      - galera-2-data:/var/lib/mysql
    depends_on:
      - galera-1

  galera-3:
    <<: *galera-common
    container_name: galera-3
    hostname: galera-3
    environment:
      <<: *galera-env
      GALERA_NODE_NAME: galera-3
    volumes:
      - galera-3-data:/var/lib/mysql
    depends_on:
      - galera-1

networks:
  galera-net:
    driver: bridge

volumes:
  galera-1-data:
  galera-2-data:
  galera-3-data:
